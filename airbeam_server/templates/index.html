<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AirBeam Research</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0f1a;color:#e2e8f0;font-family:'DM Sans',sans-serif;}
input,textarea,button{font-family:'DM Sans',sans-serif;}
input:focus,textarea:focus{outline:none;border-color:#3b82f6!important;}
button{cursor:pointer;}button:hover{opacity:0.85;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:#0a0f1a;}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.shake{animation:shake 0.4s ease;}
</style>
</head>
<body>
<div id="root"></div>
<script>
window.addEventListener('load', function() {
  try {
  if (!window.React || !window.ReactDOM) {
    document.getElementById('root').innerHTML = '<div style="color:#ef4444;padding:40px;font-family:monospace;">React failed to load. Check internet connection and refresh.</div>';
    return;
  }
  var R=window.React, RD=window.ReactDOM, XL=window.XLSX;
  var e=R.createElement;
  var useState=R.useState, useMemo=R.useMemo, useRef=R.useRef, useEffect=R.useEffect;

  var CORRECT_PIN="airbeam2026";var VIEWER_PIN="airbeam-view";
  var CATEGORY_META={
    "Bus Stops":          {hex:"#FFC000",text:"#5a3e00",icon:"🚏",ivLabels:["Distance from road","Position vs. Shelter","Traffic","Highway?"],locationHint:"City, Bus Stop",notesHint:"Traffic, Wind, Events..."},
    "Riding Bus":         {hex:"#92D050",text:"#2a4a00",icon:"🚌",ivLabels:["# of people","Position","Windows"],locationHint:"City / Route",notesHint:"Door openings, Events..."},
    "Transit Comparison": {hex:"#FF7D7D",text:"#5a0000",icon:"🚆",ivLabels:["# of people","Position"],locationHint:"Vancouver",notesHint:"Above/Underground, Airflow..."},
    "City Comparison":    {hex:"#00B0F0",text:"#003a50",icon:"🌆",ivLabels:["Crowding","Traffic","Wind","Weather"],locationHint:"City, Area",notesHint:"Events, Peaks..."},
    "Dental":             {hex:"#FF99FF",text:"#5a005a",icon:"🦷",ivLabels:["Size of Dog","Tartar","# Extractions","Mask on/off"],locationHint:"Monitor location",notesHint:"Additional procedures..."},
    "Events":             {hex:"#CC99FF",text:"#330066",icon:"🎪",ivLabels:["Crowding","Proximity"],locationHint:"City, Location",notesHint:"Dust, Wind, Smoking..."},
    "Cooking":            {hex:"#FFFF66",text:"#4a4a00",icon:"🍳",ivLabels:["Appliance type","Windows"],locationHint:"Indoor/Outdoor",notesHint:"What was cooked, peaks..."},
    "Campfire":           {hex:"#F6CA7A",text:"#5a3200",icon:"🔥",ivLabels:["Distance from Fire","Cooking?"],locationHint:"Area",notesHint:"Wood amount, wind, stage..."},
    "Households":         {hex:"#99FFCC",text:"#005a30",icon:"🏠",ivLabels:["# of residents","Fireplace/Pets"],locationHint:"City",notesHint:"Windows, air purifier..."},
    "Wildfire":           {hex:"#E06060",text:"#3a0000",icon:"🌫️",ivLabels:["Windows","Air Purifier"],locationHint:"City, Indoor/Outdoor",notesHint:"Time to baseline, proximity..."},
    "Masks and Wildfire": {hex:"#93E3FF",text:"#002a3a",icon:"😷",ivLabels:["Mask vs No Mask","Prototype"],locationHint:"City, Indoor/Outdoor",notesHint:"Prototype details..."},
    "City Monitors":      {hex:"#B0C4DE",text:"#1a2a3a",icon:"📡",ivLabels:["Distance from Monitor"],locationHint:"City, Monitor Location",notesHint:"Wind, Dust, Traffic..."},
    "For Fun":            {hex:"#FF99CC",text:"#5a0030",icon:"✨",ivLabels:["Crowding"],locationHint:"Location",notesHint:"Anything interesting..."}
  };
  var ALL_CATS=Object.keys(CATEGORY_META);
  var PM_BANDS={
    pm25:{thresholds:[12,35,55,150],label:"PM2.5 µg/m³",unit:"µg/m³"},
    pm10:{thresholds:[20,50,100,200],label:"PM10 µg/m³",unit:"µg/m³"},
    pm1: {thresholds:[9,35,55,150],label:"PM1 µg/m³",unit:"µg/m³"},
    rh:  {thresholds:[25,50,75,90],label:"Humidity %",unit:"%"},
    temp:{thresholds:[10,20,30,40],label:"Temp °C",unit:"°C"}
  };
  var BAND_COLORS=["#4CAF50","#FFEB3B","#FF9800","#F44336","#880E4F"];
  var BAND_LABELS=["Good","Moderate","Sensitive","Unhealthy","Very Unhealthy"];

  function getBandColor(v,metric){
    var b=PM_BANDS[metric];if(!b||v==null)return"#94a3b8";
    for(var i=0;i<b.thresholds.length;i++)if(v<=b.thresholds[i])return BAND_COLORS[i];
    return BAND_COLORS[4];
  }
  function categorize(name){
    var n=(name||"").toLowerCase();
    if(n.includes("bus_stop")||n.includes("bus stop")||n.includes("bus stops"))return"Bus Stops";
    if(n.includes("riding")||n.includes("bus interior")||n.includes("riding_bus"))return"Riding Bus";
    if(n.includes("transit"))return"Transit Comparison";
    if(n.includes("city_comparison")||n.includes("city comparison"))return"City Comparison";
    if(n.includes("dental")||n.includes("nail")||n.includes("vet"))return"Dental";
    if(n.includes("event")||n.includes("highland")||n.includes("festival"))return"Events";
    if(n.includes("cook"))return"Cooking";
    if(n.includes("campfire"))return"Campfire";
    if(n.includes("household"))return"Households";
    if(n.includes("mask"))return"Masks and Wildfire";
    if(n.includes("wildfire")||n.includes("smoke"))return"Wildfire";
    if(n.includes("monitor"))return"City Monitors";
    return"For Fun";
  }
  function avgArr(arr){return arr.length?parseFloat((arr.reduce(function(a,b){return a+b;},0)/arr.length).toFixed(2)):null;}

  function parseFile(buf){
    if(!XL){alert("XLSX library not loaded.");return[];}
    var wb=XL.read(buf,{type:"array",cellDates:true});
    var sessions=[],gid=Date.now();
    wb.SheetNames.forEach(function(sn){
      var ws=wb.Sheets[sn];
      var rows=XL.utils.sheet_to_json(ws,{header:1,raw:false,dateNF:"yyyy-mm-dd hh:mm:ss"});
      if(rows.length<2)return;
      var hdr=rows[0].map(function(h){return String(h||"").trim();});
      var ti=hdr.findIndex(function(h){return h==="Timestamp";}),
          p1i=hdr.findIndex(function(h){return h.startsWith("PM1");}),
          p25i=hdr.findIndex(function(h){return h.startsWith("PM2.5");}),
          p10i=hdr.findIndex(function(h){return h.startsWith("PM10");}),
          rhi=hdr.findIndex(function(h){return h.includes("Humidity");}),
          tmi=hdr.findIndex(function(h){return h.startsWith("Temp");}),
          ni=hdr.findIndex(function(h){return h==="Note";}),
          nmi=hdr.findIndex(function(h){return h==="Session Name";});
      if(ti===-1||p25i===-1)return;
      var dr=rows.slice(1).map(function(r){
        return{ts:r[ti],pm1:parseFloat(r[p1i]),pm25:parseFloat(r[p25i]),
          pm10:parseFloat(r[p10i]),rh:parseFloat(r[rhi]),temp:parseFloat(r[tmi]),
          note:ni>=0?r[ni]:null,name:nmi>=0?r[nmi]:sn};
      }).filter(function(r){return r.ts&&!isNaN(r.pm25);});
      if(!dr.length)return;
      var bk={};
      dr.forEach(function(r){
        var d=new Date(r.ts);if(isNaN(d.getTime()))return;
        var b=Math.floor(d.getTime()/5000)*5000;
        if(!bk[b])bk[b]={pm1:[],pm25:[],pm10:[],rh:[],temp:[],notes:[]};
        if(!isNaN(r.pm1))bk[b].pm1.push(r.pm1);
        if(!isNaN(r.pm25))bk[b].pm25.push(r.pm25);
        if(!isNaN(r.pm10))bk[b].pm10.push(r.pm10);
        if(!isNaN(r.rh))bk[b].rh.push(r.rh);
        if(!isNaN(r.temp))bk[b].temp.push(r.temp);
        if(r.note&&String(r.note).trim())bk[b].notes.push(String(r.note).trim());
      });
      var ts=Object.entries(bk).sort(function(a,b){return+a[0]-+b[0];}).map(function(entry){
        var ms=entry[0],v=entry[1];
        return{t:new Date(+ms).toTimeString().slice(0,8),
          pm1:avgArr(v.pm1),pm25:avgArr(v.pm25),pm10:avgArr(v.pm10),
          rh:avgArr(v.rh),temp:avgArr(v.temp),note:v.notes[0]||null};
      });
      var nm=ts.filter(function(t){return t.note;}).map(function(t){return{t:t.t,note:t.note,pm25:t.pm25};});
      var pm25v=ts.map(function(t){return t.pm25;}).filter(Boolean);
      var sname=dr[0].name||sn,sd=new Date(dr[0].ts);
      sessions.push({id:gid++,sheet:sn,category:categorize(sname),name:sname,
        date:isNaN(sd.getTime())?"":sd.toISOString().slice(0,10),
        time:isNaN(sd.getTime())?"":sd.toTimeString().slice(0,5),
        trial:"",location:"",iv1:"",iv2:"",iv3:"",iv4:"",
        pm1:avgArr(ts.map(function(t){return t.pm1;}).filter(Boolean)),
        pm25:avgArr(pm25v),
        pm10:avgArr(ts.map(function(t){return t.pm10;}).filter(Boolean)),
        temp:avgArr(ts.map(function(t){return t.temp;}).filter(Boolean)),
        humidity:avgArr(ts.map(function(t){return t.rh;}).filter(Boolean)),
        notes:"",notePhotos:[],timeSeries:ts,noteMarkers:nm,
        maxPm25:pm25v.length?parseFloat(Math.max.apply(null,pm25v).toFixed(2)):null});
    });
    return sessions;
  }

    // ── GPS Map ──────────────────────────────────────────────────────────────
  function GPSMap(props){
    var gpsPath=props.gpsPath;
    var ref=useRef(null);
    var mapRef=useRef(null);
    useEffect(function(){
      if(!ref.current||!gpsPath||!gpsPath.length)return;
      if(mapRef.current){try{mapRef.current.remove();}catch(e){}mapRef.current=null;}
      var L=window.L;if(!L)return;
      var map=L.map(ref.current,{zoomControl:true,scrollWheelZoom:false});
      mapRef.current=map;
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'OpenStreetMap',maxZoom:19}).addTo(map);
      var pts=gpsPath.filter(function(p){return p.lat&&p.lon;});
      if(!pts.length)return;
      for(var i=0;i<pts.length-1;i++){
        var pm=pts[i].pm25||0;
        var sc=pm<=12?'#4CAF50':pm<=35?'#FFEB3B':pm<=55?'#FF9800':pm<=150?'#F44336':'#880E4F';
        L.polyline([[pts[i].lat,pts[i].lon],[pts[i+1].lat,pts[i+1].lon]],{color:sc,weight:4,opacity:0.85}).addTo(map);
      }
      L.circleMarker([pts[0].lat,pts[0].lon],{radius:7,color:'#fff',fillColor:'#22c55e',fillOpacity:1,weight:2}).bindPopup('Start').addTo(map);
      L.circleMarker([pts[pts.length-1].lat,pts[pts.length-1].lon],{radius:7,color:'#fff',fillColor:'#ef4444',fillOpacity:1,weight:2}).bindPopup('End').addTo(map);
      map.fitBounds(pts.map(function(p){return[p.lat,p.lon];}),{padding:[20,20]});
      return function(){if(mapRef.current){try{mapRef.current.remove();}catch(e){}mapRef.current=null;}};
    },[gpsPath]);
    if(!gpsPath||!gpsPath.length)return null;
    return e('div',{style:{marginBottom:14}},
      e('div',{style:{fontSize:11,color:"#94a3b8",fontFamily:"monospace",marginBottom:6}},"GPS TRACK (colour = PM2.5 level)"),
      e('div',{style:{display:"flex",gap:8,marginBottom:6,flexWrap:"wrap"}},
        [['#4CAF50','Good ≤12'],['#FFEB3B','Moderate ≤35'],['#FF9800','Sensitive ≤55'],['#F44336','Unhealthy ≤150'],['#880E4F','Very Unhealthy']].map(function(p,i){
          return e('div',{key:i,style:{display:"flex",alignItems:"center",gap:4,fontSize:10,fontFamily:"monospace",color:"#94a3b8"}},
            e('div',{style:{width:20,height:4,borderRadius:2,background:p[0]}}),p[1]);
        })
      ),
      e('div',{ref:ref,style:{height:260,borderRadius:10,overflow:"hidden",border:"1px solid #334155"}})
    );
  }

  // ── Scale Settings ────────────────────────────────────────────────────────
  var DEFAULT_SCALES={
    pm25:{thresholds:[12,35,55,150],label:"PM2.5 µg/m³",unit:"µg/m³"},
    pm10:{thresholds:[20,50,100,200],label:"PM10 µg/m³",unit:"µg/m³"},
    pm1: {thresholds:[9,35,55,150],label:"PM1 µg/m³",unit:"µg/m³"},
    rh:  {thresholds:[25,50,75,90],label:"Humidity %",unit:"%"},
    temp:{thresholds:[10,20,30,40],label:"Temp °C",unit:"°C"}
  };
  function ScaleModal(props){
    var sv=useState(function(){try{var r=localStorage.getItem('ab_scales');return r?JSON.parse(r):JSON.parse(JSON.stringify(DEFAULT_SCALES));}catch(e){return JSON.parse(JSON.stringify(DEFAULT_SCALES));}}),scales=sv[0],setScales=sv[1];
    function upd(metric,idx,val){var n=JSON.parse(JSON.stringify(scales));n[metric].thresholds[idx]=parseFloat(val)||0;setScales(n);}
    function save(){try{localStorage.setItem('ab_scales',JSON.stringify(scales));}catch(e){}props.onSave(scales);props.onClose();}
    function reset(){var d=JSON.parse(JSON.stringify(DEFAULT_SCALES));setScales(d);try{localStorage.removeItem('ab_scales');}catch(e){}props.onSave(d);props.onClose();}
    var inp={background:"#1e293b",border:"1px solid #334155",borderRadius:6,padding:"5px 8px",color:"#e2e8f0",fontSize:12,width:68,textAlign:"center",fontFamily:"monospace"};
    var lb={fontSize:10,color:"#64748b",fontFamily:"monospace",textAlign:"center",display:"block",marginBottom:2};
    return e('div',{style:{position:"fixed",inset:0,background:"#0009",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}},
      e('div',{style:{background:"#0f172a",borderRadius:16,padding:24,width:"100%",maxWidth:500,border:"1px solid #334155",maxHeight:"90vh",overflowY:"auto"}},
        e('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
          e('div',{style:{fontFamily:"monospace",fontWeight:700,fontSize:15,color:"#e2e8f0"}},"⚙️ Graph Scale Settings"),
          e('button',{onClick:props.onClose,style:{background:"none",border:"none",color:"#64748b",fontSize:20,cursor:"pointer"}},"✕")
        ),
        e('div',{style:{fontSize:12,color:"#64748b",fontFamily:"monospace",marginBottom:14}},"Set band thresholds for Good / Moderate / Sensitive / Unhealthy"),
        Object.keys(scales).map(function(metric){
          var scale=scales[metric];
          return e('div',{key:metric,style:{marginBottom:12,background:"#1e293b",borderRadius:10,padding:12}},
            e('div',{style:{fontFamily:"monospace",fontSize:13,color:"#94a3b8",marginBottom:8,fontWeight:700}},scale.label),
            e('div',{style:{display:"flex",gap:8,flexWrap:"wrap"}},
              ['Good max','Moderate max','Sensitive max','Unhealthy max'].map(function(band,i){
                return e('div',{key:i,style:{textAlign:"center"}},
                  e('label',{style:lb},band),
                  e('input',{type:"number",value:scale.thresholds[i],onChange:function(ev){upd(metric,i,ev.target.value);},style:inp})
                );
              })
            )
          );
        }),
        e('div',{style:{display:"flex",gap:10,justifyContent:"flex-end",marginTop:12}},
          e('button',{onClick:reset,style:{background:"#334155",border:"none",borderRadius:8,padding:"9px 18px",color:"#94a3b8",fontSize:13,cursor:"pointer"}},"Reset Defaults"),
          e('button',{onClick:save,style:{background:"#3b82f6",border:"none",borderRadius:8,padding:"9px 18px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}},"Save")
        )
      )
    );
  }

  // ── SVG Chart ──────────────────────────────────────────────────────────────
  function SVGChart(props){
    var ts=props.timeSeries,nm=props.noteMarkers,metric=props.metric,color=props.color,label=props.label,unit=props.unit,thresholds=props.thresholds;
    var ws=useState(600),w=ws[0],setW=ws[1];
    var tt=useState(null),tooltip=tt[0],setTooltip=tt[1];
    var ref=useRef(null);
    useEffect(function(){
      if(!ref.current)return;
      setW(ref.current.clientWidth||600);
      var ro=new ResizeObserver(function(en){setW(en[0].contentRect.width);});
      ro.observe(ref.current);
      return function(){ro.disconnect();};
    },[]);
    if(!ts||!ts.length)return null;
    var vals=ts.map(function(t){return t[metric];}).filter(function(v){return v!=null;});
    if(!vals.length)return null;
    var H=150,PL=34,PR=8,PT=6,PB=18;
    var cW=Math.max(w-PL-PR,1),cH=H-PT-PB;
    var yMax=Math.max(thresholds[thresholds.length-1],Math.max.apply(null,vals)*1.1);
    function xP(i){return PL+(ts.length<2?0.5:i/(ts.length-1))*cW;}
    function yP(v){return PT+cH*(1-(v/yMax));}
    var bands=[0].concat(thresholds,[yMax]);
    var bandRects=[];
    for(var bi=0;bi<bands.length-1;bi++){
      var by1=yP(bands[bi+1]),by2=yP(bands[bi]);
      bandRects.push(e('rect',{key:"b"+bi,x:PL,y:by1,width:cW,height:Math.max(by2-by1,0),fill:BAND_COLORS[bi],fillOpacity:0.3}));
    }
    var ptArr=[];
    ts.forEach(function(t,i){var v=t[metric];if(v!=null)ptArr.push(xP(i)+","+yP(v));});
    var step=Math.max(1,Math.floor(ts.length/6));
    var xLabels=[];
    ts.forEach(function(t,i){if(i%step===0)xLabels.push(e('text',{key:"x"+i,x:xP(i),y:H-3,textAnchor:"middle",fontSize:8,fill:"#64748b",fontFamily:"monospace"},t.t.slice(0,5)));});
    var yVals=[0,Math.round(yMax*0.5),Math.round(yMax)];
    var yLabels=yVals.map(function(v){return e('text',{key:"y"+v,x:PL-3,y:yP(v)+3,textAnchor:"end",fontSize:8,fill:"#64748b",fontFamily:"monospace"},v);});
    var noteLines=(nm||[]).map(function(n,i){
      var idx=ts.findIndex(function(t){return t.t===n.t;});
      if(idx<0)return null;
      return e('line',{key:"nl"+i,x1:xP(idx),x2:xP(idx),y1:PT,y2:PT+cH,stroke:"#ffffff70",strokeDasharray:"3 2",strokeWidth:1});
    });
    var ttEl=null;
    if(tooltip){
      var noteMatch=(nm||[]).find(function(n){return n.t===tooltip.t;});
      var noteText=noteMatch?noteMatch.note:null;
      var boxW=noteText?Math.min(noteText.length*6+16,280):110;
      var boxH=noteText?52:32;
      var tx=Math.min(tooltip.x+8,w-boxW-4),ty=Math.max(tooltip.y-boxH-4,PT);
      var ttChildren=[
        e('rect',{x:tx,y:ty,width:boxW,height:boxH,fill:"#0f172a",stroke:noteText?"#60a5fa":"#334155",strokeWidth:noteText?1.5:1,rx:6}),
        e('text',{x:tx+8,y:ty+14,fontSize:9,fill:"#94a3b8",fontFamily:"monospace"},tooltip.t.slice(0,5)),
        e('text',{x:tx+8,y:ty+27,fontSize:10,fill:color,fontFamily:"monospace",fontWeight:"bold"},tooltip.v+" "+unit)
      ];
      if(noteText){
        // Word-wrap note into ~40 char lines
        var words=noteText.split(' '),line='',lines=[];
        words.forEach(function(w){
          if((line+' '+w).trim().length>42){lines.push(line.trim());line=w;}
          else line=(line+' '+w).trim();
        });
        if(line)lines.push(line.trim());
        lines.forEach(function(l,li){
          ttChildren.push(e('text',{key:'nl'+li,x:tx+8,y:ty+41+li*13,fontSize:9,fill:"#93c5fd",fontFamily:"monospace"},l));
        });
        // Adjust box height for wrapped lines
        ttChildren[0]=e('rect',{x:tx,y:ty,width:boxW,height:32+lines.length*13+4,fill:"#0f172a",stroke:"#60a5fa",strokeWidth:1.5,rx:6});
      }
      ttEl=e('g',null,...ttChildren);
    }
    function onMove(ev){
      var rect=ev.currentTarget.getBoundingClientRect();
      var mx=ev.clientX-rect.left-PL;
      var idx=Math.round(mx/cW*(ts.length-1));
      idx=Math.max(0,Math.min(ts.length-1,idx));
      var pt=ts[idx];
      if(pt&&pt[metric]!=null)setTooltip({x:ev.clientX-rect.left,y:ev.clientY-rect.top,t:pt.t,v:pt[metric]});
    }
    return e('div',{ref:ref,style:{marginBottom:6}},
      e('div',{style:{fontSize:10,color:"#94a3b8",fontFamily:"monospace",marginBottom:2,paddingLeft:2}},label),
      e('svg',{width:"100%",height:H,style:{display:"block"},onMouseMove:onMove,onMouseLeave:function(){setTooltip(null);}},
        bandRects,
        noteLines,
        ptArr.length?e('polyline',{points:ptArr.join(" "),fill:"none",stroke:color,strokeWidth:2,strokeLinejoin:"round"}):null,
        xLabels,yLabels,ttEl
      )
    );
  }

  function BandLegend(){
    return e('div',{style:{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}},
      BAND_LABELS.map(function(l,i){
        return e('div',{key:i,style:{display:"flex",alignItems:"center",gap:4,fontSize:10,fontFamily:"monospace",color:"#94a3b8"}},
          e('div',{style:{width:10,height:10,borderRadius:2,background:BAND_COLORS[i],opacity:0.85}}),l);
      })
    );
  }

  function SessionCharts(props){
    var session=props.session,activeMetric=props.activeMetric,onMetricChange=props.onMetricChange;
    var ts=session.timeSeries,nm=session.noteMarkers;
    if(!ts||!ts.length)return e('div',{style:{textAlign:"center",padding:16,color:"#334155",fontFamily:"monospace",fontSize:12}},"Upload merged_sessions.xlsx to see graphs");
    var activeBands=props.customScales||PM_BANDS;
    var metrics=[
      {key:"pm25",color:"#60a5fa"},{key:"pm10",color:"#a78bfa"},
      {key:"pm1",color:"#34d399"},{key:"rh",color:"#38bdf8"},{key:"temp",color:"#fbbf24"}
    ].filter(function(m){return ts.some(function(t){return t[m.key]!=null;});})

    function handleSave(data){
      if(data.id){
        fetch('/api/sessions/'+data.id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
          .then(function(){setSessions(function(ss){return ss.map(function(s){return s.id===data.id?Object.assign({},s,data):s;});});})
          .catch(function(){showToast('Save failed',false);});
      } else {
        fetch('/api/sessions/new',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
          .then(function(r){return r.json();})
          .then(function(res){setSessions(function(ss){return ss.concat([Object.assign({},data,{id:res.id,timeSeries:[],noteMarkers:[],notePhotos:[]})]);});})
          .catch(function(){showToast('Save failed',false);});
      }
      setModal(null);
    }
    function handleUpdatePhotos(id,photos){
      fetch('/api/sessions/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({notePhotos:photos})}).catch(function(){});
      setSessions(function(ss){return ss.map(function(s){return s.id===id?Object.assign({},s,{notePhotos:photos}):s;});});
    }

    var filtered=useMemo(function(){return sessions.filter(function(s){
      if(activeTab!=="all"&&s.category!==activeTab)return false;
      if(!search)return true;
      var q=search.toLowerCase();
      return[s.location,s.notes,String(s.trial),s.date,s.name].some(function(v){return v&&v.toLowerCase().includes(q);});
    });},[sessions,activeTab,search]);
    var cats=activeTab==="all"?allCats:[activeTab];
    var pm25s=sessions.filter(function(s){return s.pm25;});
    var avgAll=pm25s.length?(pm25s.reduce(function(a,b){return a+b.pm25;},0)/pm25s.length).toFixed(2):"—";

        if(!dataLoaded)return e('div',{style:{minHeight:"100vh",background:"#0a0f1a",display:"flex",alignItems:"center",justifyContent:"center"}},e('div',{style:{textAlign:"center"}},e('div',{style:{fontSize:40,marginBottom:14}},"🌬️"),e('div',{style:{fontFamily:"monospace",color:"#475569",fontSize:14}},"Loading your research data…")));
    return e('div',{style:{minHeight:"100vh",background:"#0a0f1a",color:"#e2e8f0"}},
      toast?e('div',{style:{position:"fixed",bottom:20,right:20,zIndex:300,background:toast.ok?"#166534":"#7f1d1d",border:"1px solid "+(toast.ok?"#22c55e":"#ef4444"),borderRadius:10,padding:"10px 16px",fontFamily:"monospace",fontSize:13,color:"#fff",boxShadow:"0 4px 20px #0008"}},(toast.ok?"✓ ":"✕ ")+toast.msg):null,
      e('div',{style:{background:"#0d1625",borderBottom:"1px solid #1e293b",padding:"14px 20px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:50}},
        e('div',{style:{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}},"🌬️"),
        e('div',null,
          e('div',{style:{fontWeight:700,fontSize:16,color:"#f1f5f9",fontFamily:"monospace"}},"AirBeam Research",viewOnly?e('span',{style:{marginLeft:8,background:"#1e40af",color:"#93c5fd",borderRadius:6,padding:"2px 8px",fontSize:10,fontFamily:"monospace"}},"VIEW ONLY"):null),
          e('div',{style:{fontSize:11,color:"#475569",fontFamily:"monospace"}},sessions.length+" sessions · avg PM2.5 "+avgAll+" µg/m³")
        ),
        e('div',{style:{flex:1}}),
        e('input',{value:search,onChange:function(ev){setSearch(ev.target.value);},placeholder:"Search…",
          style:{background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"7px 11px",color:"#e2e8f0",fontSize:13,width:160}}),
        viewOnly?null:e('button',{onClick:function(){setShowScales(true);},style:{background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"7px 10px",color:"#94a3b8",fontSize:12,cursor:"pointer",flexShrink:0}},"⚙️ Scales")
      ),
      e('div',{style:{overflowX:"auto",padding:"10px 20px 0",display:"flex",gap:4,borderBottom:"1px solid #1e293b",background:"#0d1625"}},
        e('button',{onClick:function(){setActiveTab("all");},
          style:{flexShrink:0,background:activeTab==="all"?"#3b82f620":"transparent",border:"1px solid "+(activeTab==="all"?"#3b82f6":"#334155"),borderBottom:"none",borderRadius:"7px 7px 0 0",padding:"6px 12px",color:activeTab==="all"?"#3b82f6":"#64748b",fontFamily:"monospace",fontSize:10,marginBottom:-1}},"All ("+sessions.length+")"),
        allCats.map(function(cat){
          var meta=CATEGORY_META[cat],cnt=sessions.filter(function(s){return s.category===cat;}).length,act=activeTab===cat;
          return e('button',{key:cat,onClick:function(){setActiveTab(cat);},
            style:{flexShrink:0,backgroundColor:act?meta.hex:"transparent",border:"1px solid "+(act?meta.hex:"#334155"),borderBottom:"none",borderRadius:"7px 7px 0 0",padding:"6px 10px",color:act?meta.text:"#94a3b8",fontFamily:"monospace",fontSize:10,marginBottom:-1,display:"flex",alignItems:"center",gap:4}},
            meta.icon,cat,cnt?e('span',{style:{background:act?"#fff3":"#334155",color:act?meta.text:"#94a3b8",borderRadius:8,padding:"0 4px",fontSize:9}},cnt):null);
        }),
        viewOnly?null:e('button',{onClick:function(){setShowNewCat(true);},
          style:{flexShrink:0,background:"transparent",border:"1px dashed #334155",borderBottom:"none",borderRadius:"7px 7px 0 0",padding:"6px 12px",color:"#475569",fontFamily:"monospace",fontSize:10,marginBottom:-1,marginLeft:4}},"+ New Section")
      ),
      e('div',{style:{padding:"16px 20px",maxWidth:960,margin:"0 auto"}},
        viewOnly?null:e(UploadZone,{onUpload:handleUpload,loading:loading}),
        cats.map(function(cat){
          var cs=filtered.filter(function(s){return s.category===cat;}).sort(function(a,b){return (a.trial||0)-(b.trial||0);});
          if(activeTab!=="all"||cs.length>0||!search)
            return e(CategorySection,{key:cat,category:cat,sessions:cs,scenario:scenarios[cat]||"",
              onScenarioChange:function(v){
                fetch('/api/scenarios/'+encodeURIComponent(cat),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({scenario:v})}).catch(function(){});
                setScenarios(function(sc){var o=Object.assign({},sc);o[cat]=v;return o;});
              },
              viewOnly:viewOnly,
              customScales:customScales,
              onAdd:function(c){setModal({category:c});},
              onEdit:function(s){setModal({category:s.category,session:s});},
              onDelete:function(id){
                fetch('/api/sessions/'+id,{method:'DELETE'})
                  .then(function(){setSessions(function(ss){return ss.filter(function(s){return s.id!==id;});});})
                  .catch(function(){showToast('Delete failed',false);});
              },
              onUpdatePhotos:handleUpdatePhotos});
          return null;
        })
      ),
      showScales?e(ScaleModal,{onSave:function(s){setCustomScales(s);},onClose:function(){setShowScales(false);}}):null,
      modal?e(Modal,{category:modal.category,session:modal.session,onSave:handleSave,onClose:function(){setModal(null);}}):null,
      showNewCat?e(NewCategoryModal,{
        onSave:function(cat){
          if(!CATEGORY_META[cat.name]){
            CATEGORY_META[cat.name]={hex:cat.hex,text:cat.text,icon:cat.icon,ivLabels:[],locationHint:"Location",notesHint:"Notes..."};
            setAllCats(function(ac){return ac.concat([cat.name]);});
            fetch('/api/categories',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cat)}).catch(function(){});
          }
          setShowNewCat(false);
        },
        onClose:function(){setShowNewCat(false);}
      }):null
    );
  }

  // ── Quick Tag Groups ──────────────────────────────────────────────────────
  var TAG_GROUPS = [
    {label:"Windows",     tags:["Windows Open","Windows Closed","1 Window Open","2+ Windows Open"]},
    {label:"Location",    tags:["Indoors","Outdoors"]},
    {label:"Crowding",    tags:["Low (0-25 people)","Moderate (25-50 people)","High (50+ people)"]},
    {label:"Traffic",     tags:["Low (0-10 cars)","Moderate (10-20 cars)","High (20+ cars)"]},
    {label:"Wind",        tags:["Calm (0-5 km/h)","Light (5-15 km/h)","Moderate (15-30 km/h)","Strong (30+ km/h)"]},
    {label:"Weather",     tags:["Sunny","Cloudy","Overcast","Raining","Foggy"]},
    {label:"A/C & Heat",  tags:["A/C On","A/C Off","Heat On","Heat Off","HVAC On","HVAC Off"]},
    {label:"Air Purifier",tags:["Air Purifier On","Air Purifier Off"]},
    {label:"Mask",        tags:["Mask On","Mask Off","N95","Surgical Mask","Cloth Mask"]},
    {label:"Door",        tags:["Door Open","Door Closed","Door Opened Briefly"]},
    {label:"Cooking",     tags:["Gas Stove","Electric Stove","Oven","BBQ","Frying","Boiling","No Cooking"]},
    {label:"Fireplace",   tags:["Fireplace On","Fireplace Off","Wood Stove On","Wood Stove Off"]},
    {label:"Smoking",     tags:["Smoking Nearby","No Smoking"]},
    {label:"Shelter",     tags:["In Shelter","Not in Shelter","Shelter w/ Screen","Shelter No Screen"]},
    {label:"Vehicle",     tags:["Bus Doors Open","Bus Doors Closed","Near Exhaust","Near Engine"]},
  ];

  function QuickTags(props){
    // props.notes (string), props.onChange(newNotes)
    var openGroup = useState(null);
    var activeGroupIdx = openGroup[0], setActiveGroupIdx = openGroup[1];
    var active = useState([]);
    var activeTags = active[0], setActiveTags = active[1];

    function toggleTag(tag){
      var isActive = activeTags.indexOf(tag) >= 0;
      var newActive;
      if(isActive){
        newActive = activeTags.filter(function(t){return t!==tag;});
      } else {
        newActive = activeTags.concat([tag]);
      }
      setActiveTags(newActive);
      // Rebuild notes: strip old tags and re-append active ones
      var base = props.notes;
      // Remove any previously added tags from notes
      TAG_GROUPS.forEach(function(g){
        g.tags.forEach(function(t){
          base = base.replace(", "+t,"").replace(t+", ","").replace(t,"");
        });
      });
      base = base.trim().replace(/,\s*$/,"").replace(/^\s*,/,"").trim();
      var tagStr = newActive.join(", ");
      var combined = base && tagStr ? base+", "+tagStr : base || tagStr;
      props.onChange(combined);
    }

    return e('div',{style:{marginBottom:10}},
      e('div',{style:{fontSize:11,color:"#64748b",fontFamily:"monospace",marginBottom:6}},"QUICK TAGS"),
      e('div',{style:{display:"flex",gap:4,flexWrap:"wrap",marginBottom:6}},
        TAG_GROUPS.map(function(group, gi){
          var isOpen = activeGroupIdx===gi;
          var groupActive = group.tags.some(function(t){return activeTags.indexOf(t)>=0;});
          return e('button',{key:gi,
            onClick:function(){setActiveGroupIdx(isOpen?null:gi);},
            style:{background:groupActive?"#1e40af":isOpen?"#1e293b":"#0f172a",
              border:"1px solid "+(groupActive?"#3b82f6":isOpen?"#475569":"#334155"),
              borderRadius:6,padding:"3px 10px",fontSize:11,
              color:groupActive?"#93c5fd":isOpen?"#94a3b8":"#64748b",
              fontFamily:"monospace",cursor:"pointer",whiteSpace:"nowrap"}},
            group.label+(groupActive?" ✓":"")
          );
        })
      ),
      activeGroupIdx!==null?e('div',{style:{background:"#0f172a",borderRadius:8,padding:"8px 10px",border:"1px solid #334155",display:"flex",gap:6,flexWrap:"wrap"}},
        TAG_GROUPS[activeGroupIdx].tags.map(function(tag){
          var isOn = activeTags.indexOf(tag)>=0;
          return e('button',{key:tag,onClick:function(){toggleTag(tag);},
            style:{background:isOn?"#1d4ed8":"#1e293b",
              border:"1px solid "+(isOn?"#3b82f6":"#334155"),
              borderRadius:20,padding:"4px 12px",fontSize:12,
              color:isOn?"#fff":"#94a3b8",
              fontFamily:"monospace",cursor:"pointer",
              fontWeight:isOn?700:400}},
            tag
          );
        })
      ):null
    );
  }

  // ── New Category Modal ────────────────────────────────────────────────────
  var PRESET_ICONS=["🔬","🏙️","🌿","🚗","🏫","🏥","🛒","🎯","🌊","🏔️","💨","🔥","📊","🐾"];
  var PRESET_COLORS=[
    {hex:"#FFB347",text:"#5a2d00"},{hex:"#87CEEB",text:"#002a3a"},{hex:"#98FB98",text:"#003a00"},
    {hex:"#DDA0DD",text:"#3a003a"},{hex:"#F0E68C",text:"#4a4a00"},{hex:"#FFA07A",text:"#5a1a00"},
    {hex:"#B0E0E6",text:"#002a30"},{hex:"#FFDAB9",text:"#5a2a00"},{hex:"#E6E6FA",text:"#1a003a"},
    {hex:"#90EE90",text:"#003a00"}
  ];
  function NewCategoryModal(props){
    var nv=useState(""),name=nv[0],setName=nv[1];
    var iv=useState("🔬"),icon=iv[0],setIcon=iv[1];
    var cv=useState(PRESET_COLORS[0]),color=cv[0],setColor=cv[1];
    var err=useState(""),error=err[0],setError=err[1];
    function save(){
      var n=name.trim();
      if(!n){setError("Please enter a section name.");return;}
      if(CATEGORY_META[n]){setError("A section with this name already exists.");return;}
      props.onSave({name:n,hex:color.hex,text:color.text,icon:icon});
    }
    var inp={background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"8px 10px",color:"#e2e8f0",fontSize:13,width:"100%",boxSizing:"border-box"};
    var lbl={fontSize:11,color:"#64748b",fontFamily:"monospace",display:"block",marginBottom:4};
    return e('div',{style:{position:"fixed",inset:0,background:"#0009",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}},
      e('div',{style:{background:"#0f172a",borderRadius:16,padding:24,width:"100%",maxWidth:440,border:"2px solid "+color.hex+"60"}},
        e('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}},
          e('div',{style:{fontSize:15,fontWeight:700,color:color.hex,fontFamily:"monospace"}},icon+" New Section"),
          e('button',{onClick:props.onClose,style:{background:"none",border:"none",color:"#64748b",fontSize:22,lineHeight:1,cursor:"pointer"}},"✕")
        ),
        e('div',{style:{marginBottom:12}},
          e('label',{style:lbl},"Section Name"),
          e('input',{value:name,onChange:function(ev){setName(ev.target.value);setError("");},placeholder:"e.g. School, Hospital, Gym...",style:inp})
        ),
        e('div',{style:{marginBottom:12}},
          e('label',{style:lbl},"Icon"),
          e('div',{style:{display:"flex",gap:6,flexWrap:"wrap"}},
            PRESET_ICONS.map(function(ic){
              return e('button',{key:ic,onClick:function(){setIcon(ic);},
                style:{background:icon===ic?"#334155":"transparent",border:"1px solid "+(icon===ic?"#64748b":"#1e293b"),borderRadius:6,padding:"4px 8px",fontSize:18,cursor:"pointer"}},ic);
            })
          )
        ),
        e('div',{style:{marginBottom:16}},
          e('label',{style:lbl},"Colour"),
          e('div',{style:{display:"flex",gap:6,flexWrap:"wrap"}},
            PRESET_COLORS.map(function(c,i){
              return e('div',{key:i,onClick:function(){setColor(c);},
                style:{width:28,height:28,borderRadius:6,background:c.hex,cursor:"pointer",border:"2px solid "+(color.hex===c.hex?"#fff":"transparent")}});
            })
          )
        ),
        e('div',{style:{background:color.hex,borderRadius:8,padding:"8px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:8}},
          e('span',{style:{fontSize:18}},icon),
          e('span',{style:{fontWeight:700,fontSize:14,color:color.text,fontFamily:"monospace"}},name||"Preview")
        ),
        error?e('div',{style:{fontSize:12,color:"#ef4444",marginBottom:10,fontFamily:"monospace"}},error):null,
        e('div',{style:{display:"flex",gap:10,justifyContent:"flex-end"}},
          e('button',{onClick:props.onClose,style:{background:"#334155",border:"none",borderRadius:8,padding:"9px 18px",color:"#94a3b8",fontSize:13,cursor:"pointer"}},"Cancel"),
          e('button',{onClick:save,style:{background:color.hex,border:"none",borderRadius:8,padding:"9px 18px",color:color.text,fontSize:13,fontWeight:700,cursor:"pointer"}},"Create Section")
        )
      )
    );
  }

  // ── Root: switches between Login and Dashboard ─────────────────────────────
  function Root(){
    var uv=useState(function(){
      try{return localStorage.getItem('ab_unlocked')||'';}catch(e){return '';}
    }),unlocked=uv[0],setUnlocked=uv[1];
    function unlock(role){
      try{localStorage.setItem('ab_unlocked',role);}catch(e){}
      setUnlocked(role);
    }
    if(!unlocked)return e(Login,{onUnlock:unlock});
    return e(Dashboard,{viewOnly:unlocked==='viewer'});
  }

  RD.createRoot(document.getElementById("root")).render(e(Root,null));
  } catch(globalErr) {
    console.error("App failed to start:", globalErr);
    document.getElementById('root').innerHTML = '<div style="color:#ef4444;padding:40px;font-family:monospace;font-size:13px;line-height:1.6;"><b>App failed to start.</b><br><br>Error: '+globalErr.message+'<br><br>Try: right-click the HTML file → Open with → Brave or Chrome.</div>';
  }
});
